services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: soteria_db
      POSTGRES_USER: soteria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soteriaSecurePass2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soteria -d soteria_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soteria_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soteria_internal

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://soteria:${POSTGRES_PASSWORD:-soteriaSecurePass2026}@db:5432/soteria_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      OWM_API_KEY: ${OWM_API_KEY:-}
      WAQI_API_KEY: ${WAQI_API_KEY:-}
      CPCB_API_KEY: ${CPCB_API_KEY:-}
      CPCB_BASE_URL: ${CPCB_BASE_URL:-https://api.cpcb.gov.in}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      TOMTOM_BASE_URL: ${TOMTOM_BASE_URL:-https://api.tomtom.com/traffic/services/4}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-razorpay_test}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      TRIGGER_POLL_INTERVAL_MINUTES: ${TRIGGER_POLL_INTERVAL_MINUTES:-10}
      TRIGGER_DEDUPE_MINUTES: ${TRIGGER_DEDUPE_MINUTES:-60}
      DEFAULT_WORKER_SHIFT_START: ${DEFAULT_WORKER_SHIFT_START:-8}
      DEFAULT_WORKER_SHIFT_END: ${DEFAULT_WORKER_SHIFT_END:-23}
      AUTO_SEED: ${AUTO_SEED:-true}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - soteria_internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - soteria_internal

volumes:
  postgres_data:

networks:
  soteria_internal:
    driver: bridge
